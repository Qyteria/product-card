<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>product-card</title>
</head>

<body>
  <main>
    <h1>Выбери свой продукт</h1>
    <article>
      <figure>
        <img src="images/moisturizing-mousse.png"
        alt="Увлажняющий мусс" 
        width="290"
        height="245">
      </figure>
      <p>для нормальной кожи</p>
      <h3>Увлажняющий мусс</h3>
      <p>Глубоко увлажняют кожу лица, оставляя её мягкой и гладкой.</p>
      <span>Состав</span>
      <ul>
        <li>активные натуральные комплексы</li>
        <li>витамины С, А, РР, В И Е</li>
        <li>солнцезащитные компоненты</li>
      </ul>
      <p>
        <strong>Цена</strong>
        <span>2 750 ₽</span>
      </p>
    </article>
  </main>
</body>
</html>
